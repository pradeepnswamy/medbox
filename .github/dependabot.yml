version: 2
updates:

  # ── Flutter / pub.dev dependencies ────────────────────────────────────────
  - package-ecosystem: pub
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - flutter
    commit-message:
      prefix: "chore(deps)"

  # ── GitHub Actions ─────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Asia/Kolkata"
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "chore(ci)"
