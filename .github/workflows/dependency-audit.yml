name: Dependency audit

on:
  schedule:
    - cron: '0 3 * * 1'   # every Monday at 3 AM UTC
  workflow_dispatch:

jobs:
  audit:
    name: Check for outdated packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check for outdated packages
        id: outdated
        run: |
          OUTPUT=$(flutter pub outdated --no-color 2>&1)
          echo "$OUTPUT"
          echo "report<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT"    >> $GITHUB_OUTPUT
          echo "EOF"        >> $GITHUB_OUTPUT
          # Exit 1 if any upgradable packages found (triggers issue creation)
          if echo "$OUTPUT" | grep -q "upgradable"; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
          fi

      - name: File GitHub Issue if updates available
        if: steps.outdated.outputs.has_updates == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            const title = `Outdated dependencies detected — ${today}`;

            // Close any previous open audit issues to avoid duplicates
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              labels: 'dependencies,automated',
              state: 'open',
            });
            for (const issue of issues.data) {
              if (issue.title.startsWith('Outdated dependencies detected')) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed',
                });
              }
            }

            // Open a fresh issue with the full report
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: title,
              labels: ['dependencies', 'automated'],
              body: [
                '## Outdated Flutter dependencies',
                '',
                'The weekly dependency audit found packages with available upgrades.',
                'Review the report below, test locally, then update `pubspec.yaml`.',
                '',
                '```',
                `${{ steps.outdated.outputs.report }}`,
                '```',
                '',
                '**To update all resolvable packages:**',
                '```bash',
                'flutter pub upgrade',
                '```',
                '**To update including breaking (major) changes:**',
                '```bash',
                'flutter pub upgrade --major-versions',
                '```',
                '',
                `_Generated automatically on ${today}_`,
              ].join('\n'),
            });
