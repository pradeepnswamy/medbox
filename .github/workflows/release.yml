name: Release

on:
  push:
    tags:
      - 'v*.*.*'   # triggers on v1.0.0, v1.2.3, etc.

jobs:
  build-android:
    name: Build Android App Bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: stable
          cache: true

      - name: Write google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json

      - name: Write keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/medbox.jks

      - run: flutter pub get

      - name: Build App Bundle
        run: |
          flutter build appbundle --release \
            --build-name="${{ github.ref_name }}" \
            --build-number="${{ github.run_number }}"
        env:
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS:      ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD:   ${{ secrets.ANDROID_KEY_PASSWORD }}

      - uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: build/app/outputs/bundle/release/app-release.aab

  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: stable
          cache: true

      - name: Write GoogleService-Info.plist
        run: echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}" | base64 --decode > ios/Runner/GoogleService-Info.plist

      - run: flutter pub get
      - run: cd ios && pod install --repo-update

      - name: Install certificate and provisioning profile
        run: |
          security create-keychain -p "${{ secrets.IOS_KEYCHAIN_PASSWORD }}" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain  -p "${{ secrets.IOS_KEYCHAIN_PASSWORD }}" build.keychain
          echo "${{ secrets.IOS_CERTIFICATE_BASE64 }}" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain \
            -P "${{ secrets.IOS_CERTIFICATE_PASSWORD }}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -k "${{ secrets.IOS_KEYCHAIN_PASSWORD }}" build.keychain
          security list-keychains -d user -s build.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/medbox.mobileprovision

      - name: Build IPA
        run: |
          flutter build ipa --release \
            --build-name="${{ github.ref_name }}" \
            --build-number="${{ github.run_number }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: build/ios/ipa/medbox.ipa

      - name: Clean up keychain
        if: always()
        run: security delete-keychain build.keychain

  create-release:
    name: Create GitHub Release
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-release
          path: release/

      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-release
          path: release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: MedBox ${{ github.ref_name }}
          draft: true        # opens as draft — you publish manually
          generate_release_notes: true
          files: |
            release/app-release.aab
            release/medbox.ipa
